    <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Triggers DBBD</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="stylesheet" href="/static/css/triggers/triggers.css">
    <link rel="icon" type="image/png" href="static/images/favicon.png">
</head>

<body>
    <div class="page-wrapper">

        <header class="page-header">
            <h1>DBBD / <span>Deployed Baits</span></h1>
            <span class="badge" id="count-badge">— baits</span>
        </header>

        <div class="table-card">
            <table id="trigger-table">
                <thead>
                    <tr>
                        <th>#</th>
                        <th>Token</th>
                        <th>Callback Email</th>
                        <th>Reminder</th>
                        <th>Created</th>
                        <th style="width:80px; text-align:center;">Action</th>
                    </tr>
                </thead>
                <tbody id="trigger-table-body">
                    <tr class="state-row">
                        <td colspan="6">
                            <span class="spinner"></span> Loading baits…
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>

    </div>

    <!-- Confirmation Modal -->
    <div class="modal-overlay" id="delete-modal">
        <div class="modal">
            <div class="modal-icon">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4h6v2"/>
                </svg>
            </div>
            <h2>Delete Bait?</h2>
            <p>This will permanently remove the bait and all associated data. This action cannot be undone.</p>
            <div class="modal-token" id="modal-token-display">—</div>
            <div class="modal-actions">
                <button class="btn btn-cancel" id="modal-cancel">Cancel</button>
                <button class="btn btn-confirm-delete" id="modal-confirm">Delete Bait</button>
            </div>
        </div>
    </div>

    <script>
        // Modal state
        let pendingDeleteId  = null;
        let pendingDeleteRow = null;

        const modal      = document.getElementById('delete-modal');
        const modalToken = document.getElementById('modal-token-display');
        const btnCancel  = document.getElementById('modal-cancel');
        const btnConfirm = document.getElementById('modal-confirm');

        function openModal(id, token, row) {
            pendingDeleteId  = id;
            pendingDeleteRow = row;
            modalToken.textContent = token;
            modal.classList.add('open');
            btnConfirm.disabled = false;
            btnConfirm.textContent = 'Delete Bait';
        }

        function closeModal() {
            modal.classList.remove('open');
            pendingDeleteId  = null;
            pendingDeleteRow = null;
        }

        btnCancel.addEventListener('click', closeModal);
        modal.addEventListener('click', (e) => { if (e.target === modal) closeModal(); });

        btnConfirm.addEventListener('click', async () => {
            if (!pendingDeleteId) return;

            const authToken = localStorage.getItem('token');
            if (!authToken) { window.location.href = '/auth/login'; return; }

            btnConfirm.disabled = true;
            btnConfirm.textContent = 'Deleting…';

            console.log('Attempting DELETE:', `/api/v1/triggers/${pendingDeleteId}`); // ← add this

            try {
                const res = await fetch(`/api/v1/triggers/${pendingDeleteId}`, {
                    method: 'DELETE',
                    headers: { 'Authorization': `Bearer ${authToken}` }
                });

                console.log('Response status:', res.status); // ← and this

                if (res.status === 401) {
                    window.location.href = '/auth/login';
                    return;
                }

                // Remove row regardless — optimistic UI
                pendingDeleteRow.style.transition = 'opacity 0.3s, transform 0.3s';
                pendingDeleteRow.style.opacity = '0';
                pendingDeleteRow.style.transform = 'translateX(12px)';
                setTimeout(() => { pendingDeleteRow.remove(); updateBadgeCount(-1); }, 300);
                closeModal();

            } catch (err) {
                console.error("Delete error:", err); // ← this tells us if it's a network/CORS issue
                closeModal(); // close modal even on error
            }
        });

        // Badge count helper 
        function updateBadgeCount(delta) {
            const badge = document.getElementById('count-badge');
            const current = parseInt(badge.dataset.count || '0') + delta;
            badge.dataset.count = current;
            badge.textContent = `${current} bait${current !== 1 ? 's' : ''}`;
            if (current === 0) {
                document.getElementById('trigger-table-body').innerHTML =
                    '<tr class="state-row"><td colspan="6">No baits deployed yet.</td></tr>';
            }
        }

        // Load Baits to table
        async function loadTriggers() {
            const token = localStorage.getItem('token');
            if (!token) { window.location.href = '/auth/login'; return; }

            try {
                const response = await fetch('/api/v1/triggers', {
                    method: 'GET',
                    headers: { 'Authorization': `Bearer ${token}` }
                });

                if (response.status === 401) {
                    alert("Session expired. Redirecting to login.");
                    window.location.href = "/auth/login";
                    return;
                }

                const result    = await response.json();
                const tableBody = document.getElementById('trigger-table-body');
                tableBody.innerHTML = '';

                if (!response.ok) {
                    tableBody.innerHTML = `<tr class="state-row"><td colspan="6">Error: ${result.message || 'Could not fetch data'}</td></tr>`;
                    return;
                }

                if (result.data.length === 0) {
                    tableBody.innerHTML = '<tr class="state-row"><td colspan="6">No baits deployed yet.</td></tr>';
                    return;
                }

                const badge = document.getElementById('count-badge');
                badge.textContent  = `${result.data.length} bait${result.data.length !== 1 ? 's' : ''}`;
                badge.dataset.count = result.data.length;
                badge.classList.add('visible');

                result.data.forEach((trigger, i) => {
                    const row = document.createElement('tr');
                    row.style.animationDelay = `${i * 40}ms`;
                    row.innerHTML = `
                        <td>${trigger.id}</td>
                        <td class="token-cell" title="${trigger.token}">${trigger.token}</td>
                        <td class="email-cell">${trigger.callback_email}</td>
                        <td class="reminder-cell">${trigger.reminder}</td>
                        <td class="date-cell">${new Date(trigger.created_at).toLocaleString()}</td>
                        <td style="text-align:center;">
                            <button class="btn-delete" title="Delete bait"
                                    data-id="${trigger.id}" data-token="${trigger.token}">
                                <svg width="15" height="15" viewBox="0 0 24 24" fill="none"
                                     stroke="currentColor" stroke-width="2"
                                     stroke-linecap="round" stroke-linejoin="round">
                                    <polyline points="3 6 5 6 21 6"/>
                                    <path d="M19 6l-1 14H6L5 6"/>
                                    <path d="M10 11v6"/><path d="M14 11v6"/>
                                    <path d="M9 6V4h6v2"/>
                                </svg>
                            </button>
                        </td>
                    `;
                    row.querySelector('.btn-delete').addEventListener('click', (e) => {
                        const btn = e.currentTarget;
                        openModal(btn.dataset.id, btn.dataset.token, row);
                    });
                    tableBody.appendChild(row);
                });

            } catch (err) {
                console.error("Network or parse error:", err);
                document.getElementById('trigger-table-body').innerHTML =
                    '<tr class="state-row"><td colspan="6">Network error — check console.</td></tr>';
            }
        }

        window.onload = loadTriggers;
    </script>
</body>
</html>
