<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In DBBD</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="stylesheet" href="/static/css/auth/login.css">
</head>

<body>

    <div class="login-card">

        <!-- Brand -->
        <div class="brand">
            <a class="brand-logo" href="#">DB<span>BD</span></a>
            <p class="brand-sub">Deception-Based Breach Detection</p>
        </div>

        <div class="divider"></div>

        <p class="form-heading">Sign in to your account</p>

        <!-- Error banner -->
        <div class="error-msg" id="error-msg"></div>

        <!-- Email -->
        <div class="field">
            <label for="email">Email</label>
            <input type="email" id="email" name="email" placeholder="you@example.com" autocomplete="email">
        </div>

        <!-- Password -->
        <div class="field">
            <label for="password">Password</label>
            <input type="password" id="password" name="password" placeholder="••••••••" autocomplete="current-password">
        </div>

        <!-- Submit -->
        <button class="btn-login" id="btn-login">
            <span class="btn-spinner"></span>
            <span id="btn-label">Continue</span>
        </button>

        <!-- Register link -->
        <div class="login-footer">
            Don't have an account? <a href="/auth/register">Create one</a>
        </div>

    </div>

    <script>
        const emailInput  = document.getElementById('email');
        const passInput   = document.getElementById('password');
        const btnLogin    = document.getElementById('btn-login');
        const btnLabel    = document.getElementById('btn-label');
        const errorMsg    = document.getElementById('error-msg');

        function showError(msg) {
            errorMsg.textContent = msg;
            errorMsg.classList.add('visible');
            emailInput.classList.add('error');
            passInput.classList.add('error');
        }

        function clearError() {
            errorMsg.classList.remove('visible');
            emailInput.classList.remove('error');
            passInput.classList.remove('error');
        }

        function setLoading(state) {
            btnLogin.disabled = state;
            btnLogin.classList.toggle('loading', state);
            btnLabel.textContent = state ? 'Signing in…' : 'Continue';
        }

        btnLogin.addEventListener('click', async () => {
            clearError();

            const email    = emailInput.value.trim();
            const password = passInput.value;

            if (!email || !password) {
                showError('Please enter your email and password.');
                return;
            }

            setLoading(true);

            try {
                const response = await fetch('/api/v1/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });

                const result = await response.json();

                if (response.ok) {
                    localStorage.setItem('token', result.data.JWT);
                    window.location.href = '/dashboard';
                } else {
                    if (result.error) {
                        showError(result.error);
                    } else if (result.errors) {
                        showError(Object.values(result.errors).flat().join(', '));
                    } else if (result.message) {
                        showError(result.message);
                    } else {
                        showError('Login failed. Please try again.');
                    }
                    setLoading(false);
                }

            } catch (err) {
                console.error('Login error:', err);
                showError('Network error. Check your connection and try again.');
                setLoading(false);
            }
        });

        // Allow Enter key to submit
        [emailInput, passInput].forEach(input => {
            input.addEventListener('keydown', (e) => {
                if (e.key === 'Enter') btnLogin.click();
            });
        });
    </script>

</body>
</html>
