<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SilentHook Email Header v2</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background: #f6f8fa;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            font-family: 'Segoe UI', Arial, sans-serif;
        }
        .header {
            background: #0d1117;
            padding: 28px 40px;
            border-bottom: 3px solid #f97316;
            width: 520px;
            border-radius: 12px 12px 0 0;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
        }
        .icon-wrap {
            width: 54px;
            height: 54px;
            border-radius: 12px;
            background: rgba(249, 115, 22, 0.12);
            border: 1px solid rgba(249, 115, 22, 0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }
    </style>
</head>
<body>
    <div class="header">

        <!-- Icon wrap with orange tinted bg -->
        <div class="icon-wrap">
            <img src="https://img.icons8.com/ios/100/FFFFFF/fishing-hook.png"
                 alt="SilentHook"
                 width="34" height="34"
                 style="display:block;">
        </div>

        <div>
            <p style="margin:0;font-size:24px;font-weight:700;
                      letter-spacing:0.12em;text-transform:uppercase;line-height:1.1;">
                <span style="color:#8b949e;">Silent</span><span style="color:#f97316;">Hook</span>
            </p>
            <p style="margin:5px 0 0;font-size:11px;font-weight:600;
                      letter-spacing:0.22em;text-transform:uppercase;color:#8b949e;">
                Deception Engine
            </p>
        </div>

    </div>
</body>
</html>
