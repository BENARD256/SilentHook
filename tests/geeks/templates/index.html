<!DOCTYPE html>
<html lang="en">

<head>
    <title>Index Page</title>
</head>

<body>

    <h3>User's Profiles</h3>

    <a href="/add_user">NewUser</a>
    <br>
    <table>
        <thead>
            <th>Id</th>
            <th>First Name</th>
            <th>Last Name</th>
            <th>Age</th>
            <th>#</th>
        </thead>
        {% for user in users %}
        <tbody>
            <td>{{ user.id }}</td>
            <td> {{ user.fname }}</td>
            <td> {{ user.lname }}</td>
            <td> {{ user.age }}  </td>
            <td> <a href="/delete/{{ user.id }}" type="button">Delete</a></td>
        </tbody>
        {% endfor %}
    </table>


</body>

</html>
