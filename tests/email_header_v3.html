<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SilentHook Email Header</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background: #f6f8fa;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            font-family: 'Segoe UI', Arial, sans-serif;
        }
        .header {
            background: #0d1117;
            padding: 56px 80px;
            border-bottom: 6px solid #f97316;
            width: 1200px;
            border-radius: 24px 24px 0 0;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 40px;
        }

        .shield-wrap {
            position: relative;
            width: 130px;
            height: 144px;
            flex-shrink: 0;
        }

        .shield-wrap svg.shield-bg {
            position: absolute;
            top: 0; left: 0;
            width: 100%;
            height: 100%;
        }

        .shield-wrap img.hook-img {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 72px;
            height: 72px;
            object-fit: contain;
            filter: brightness(0) invert(1);
        }
    </style>
</head>
<body>
    <div class="header">

        <div class="shield-wrap">
            <svg class="shield-bg" viewBox="0 0 58 64" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M29 2L4 12V30C4 44 15 55.5 29 59C43 55.5 54 44 54 30V12L29 2Z"
                      stroke="#f97316" stroke-width="2" fill="#1a1f2e"/>
            </svg>
            <img class="hook-img"
                 src="hook.png"
                 alt="hook">
        </div>

        <div>
            <p style="margin:0;font-size:72px;font-weight:700;
                      letter-spacing:0.12em;text-transform:uppercase;line-height:1.1;">
                <span style="color:#8b949e;">Silent</span><span style="color:#f97316;">Hook</span>
            </p>
            <p style="margin:10px 0 0;font-size:26px;font-weight:600;
                      letter-spacing:0.28em;text-transform:uppercase;color:#8b949e;">
                Deception Engine
            </p>
        </div>

    </div>
</body>
</html>
